{% extends "base.html" %}

{% block title %}Login - Sales Capture{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md animate-fade-in">
        <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200/80 p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary-100 text-primary-600 mb-4">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-semibold text-slate-800">Sales Capture Login</h1>
                <p class="text-slate-500 text-sm mt-1">Sign in to view submissions</p>
            </div>

            {% if form.non_field_errors %}
                <div class="mb-6 p-4 rounded-xl bg-red-50 text-red-800 border border-red-200/80 text-sm">
                    {{ form.non_field_errors.0 }}
                </div>
            {% endif %}

            <form method="post" action="{% url 'core:login' %}" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
                    <input type="text" name="username" id="id_username" required autofocus
                        class="form-input w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                        placeholder="Enter username">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" id="id_password" required
                        class="form-input w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                        placeholder="Enter password">
                </div>
                <button type="submit" class="w-full py-3 px-4 bg-primary-500 hover:bg-primary-600 text-white font-medium rounded-xl transition-colors">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
